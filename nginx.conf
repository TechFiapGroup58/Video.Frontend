server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets Blazor (.wasm, .dll, .js)
    gzip on;
    gzip_types application/wasm application/octet-stream application/javascript text/css;
    gzip_min_length 1024;

    # Cache longo para assets com hash no nome
    location ~* \.(wasm|dll|js|css|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Todas as rotas → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Evita expor arquivos de configuração
    location ~ /\. { deny all; }
}
