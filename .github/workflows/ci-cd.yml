name: Frontend CI/CD

# ┌──────────────────────────────────────────────────────────────────────────┐
# │  FLUXO DE BRANCHES (igual AuthService e UploadService)                   │
# │                                                                          │
# │  feature/* ──PR──► develop  gate: cobertura ≥ 80% + 1 aprovação         │
# │                              → auto-merge (squash)                       │
# │                                                                          │
# │  develop   ──PR──► main     gate: cobertura ≥ 80%                       │
# │                              → auto-merge → Docker build + K8s deploy   │
# └──────────────────────────────────────────────────────────────────────────┘

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fiapx-frontend
  DOTNET_VER: "8.0.x"

jobs:

  # ── 1. BUILD + TESTES + COBERTURA ─────────────────────────────────────────
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VER }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VER }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit Tests + Coverage
        run: |
          dotnet test tests/Video.Frontend.Tests.csproj \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Coverage Gate >= 80%
        id: gate
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename:       "coverage/**/coverage.cobertura.xml"
          badge:          true
          fail_below_min: true
          format:         markdown
          thresholds:     "80 90"
          output:         both

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

  # ── 2. AUTO-MERGE: feature/* → develop ────────────────────────────────────
  auto-merge-to-develop:
    name: Auto-merge feature to develop
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'develop'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check PR approval
        id: approval
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          APPROVED=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          echo "count=$APPROVED" >> $GITHUB_OUTPUT

      - name: Merge squash — coverage OK + approved
        if: steps.approval.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --squash --auto \
            --subject "feat: auto-merge feature into develop" \
            --delete-branch

      - name: Waiting for approval
        if: steps.approval.outputs.count == '0'
        run: echo "Coverage OK. Waiting for PR approval."

  # ── 3. AUTO-MERGE: develop → main ─────────────────────────────────────────
  auto-merge-to-main:
    name: Auto-merge develop to main
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'develop'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Merge commit — coverage OK
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --merge --auto \
            --subject "release: auto-merge develop into main"

  # ── 4. DOCKER BUILD & PUSH ────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - uses: docker/build-push-action@v5
        with:
          context:    .
          file:       Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 5. DEPLOY KUBERNETES ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update image
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }} \
            -n fiapx

      - name: Rollout status
        run: kubectl rollout status deployment/frontend -n fiapx --timeout=120s
